<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attention Place</title>
  <meta name="description" content="집중을 위해 다양한 장소로 출발. Attention Place는 장소 기반 집중 타이머 앱입니다." />

  <!-- Open Graph (링크 공유 시 미리보기) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Attention Place" />
  <meta property="og:description" content="집중을 위해 다양한 장소로 출발" />
  <meta property="og:url" content="https://attentionplace.com" />

  <style>
    :root {
      --bg: #FFFFFF;
      --text: #1A1A1A;
      --muted: #6B6B6B;
      --tint: #FA0F46;          /* Color.AttentionRed */
      --tint-soft: rgba(250, 15, 70, 0.10);
      --line: #ECECEC;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
                   "Pretendard", "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { color: inherit; text-decoration: none; }

    .wrap { width: 100%; max-width: 960px; margin: 0 auto; padding: 0 24px; }

    /* ---------- Header ---------- */
    header {
      position: sticky; top: 0; z-index: 50;
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: saturate(180%) blur(14px);
      -webkit-backdrop-filter: saturate(180%) blur(14px);
      border-bottom: 1px solid var(--line);
    }
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
    }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 18px; }
    .brand .dot {
      width: 22px; height: 22px; border-radius: 7px; background: var(--tint);
    }
    .nav-links { display: flex; gap: 26px; font-size: 15px; color: var(--muted); }
    .nav-links a:hover { color: var(--tint); }

    /* ---------- Hero (center) ---------- */
    .hero {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 80px 0;
    }
    .appstore-btn {
      display: inline-flex; align-items: center; gap: 10px;
      margin-top: 36px; font-size: 16px; font-weight: 600;
      color: #FFFFFF; background: #000000;
      padding: 14px 28px; border-radius: 14px;
      transition: transform .12s ease, opacity .12s ease;
    }
    .appstore-btn svg { width: 18px; height: 22px; fill: #FFFFFF; }
    .appstore-btn:hover { opacity: 0.85; }
    .appstore-btn:active { transform: scale(0.97); }
    .hero h1 {
      font-size: clamp(32px, 6vw, 58px); font-weight: 800;
      line-height: 1.18; letter-spacing: -1px;
    }
    .hero h1 .hl { color: var(--tint); }
    .hero p {
      font-size: clamp(15px, 2.2vw, 18px); color: var(--muted);
      max-width: 520px; margin: 22px auto 0;
    }
    /* ---------- Footer ---------- */
    footer {
      border-top: 1px solid var(--line); padding: 30px 0;
      color: var(--muted); font-size: 14px;
    }
    .foot {
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 16px;
    }
    .foot a:hover { color: var(--tint); }
    .foot-links { display: flex; gap: 22px; }
  </style>
</head>
<body>

  <header>
    <div class="wrap nav">
      <div class="brand"><span class="dot"></span> Attention Place</div>
      <nav class="nav-links">
        <a href="privacy.html">개인정보처리방침</a>
      </nav>
    </div>
  </header>

  <main class="hero">
    <div class="wrap">
      <h1>집중을 위해<br /><span class="hl">다양한 장소로 출발</span></h1>
      <p>Attention Place와 함께 나에게 맞는 집중 공간을 찾아보세요.</p>
      <a class="appstore-btn" href="https://apps.apple.com/kr/app/%EC%96%B4%ED%85%90%EC%85%98-%ED%94%8C%EB%A0%88%EC%9D%B4%EC%8A%A4-%EC%95%B1-%EC%9E%A0%EA%B8%88-%EB%BD%80%EB%AA%A8%EB%8F%84%EB%A1%9C-%EC%B9%B4%EA%B3%B5-%ED%83%80%EC%9D%B4%EB%A8%B8/id6762136499" target="_blank" rel="noopener">
        <svg viewBox="0 0 384 512" aria-hidden="true"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
        App Store
      </a>
    </div>
  </main>

  <footer>
    <div class="wrap foot">
      <div>© 2026 Attention Place. All rights reserved.</div>
      <div class="foot-links">
        <span>고객센터: attentionplace.support@gmail.com</span>
        <a href="privacy.html">개인정보처리방침</a>
      </div>
    </div>
  </footer>

</body>
</html>
